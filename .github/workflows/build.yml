name: Build-Web-Game-Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows
          - os: macos-latest
            artifact_name: Mac_Silicon
          - os: macos-latest
            artifact_name: Mac_Intel
          - os: ubuntu-latest
            artifact_name: Linux

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: System-Pakete installieren (Nur Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgirepository1.0-dev gcc libcairo2-dev python3-dev gir1.2-gtk-3.0 libwebkit2gtk-4.1-dev

      - name: Abhängigkeiten installieren
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<69.0.0" pywebview pyinstaller bottle
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            pip install "PyGObject==3.48.2" pycairo
          fi

      - name: Wrapper-Skript automatisch erstellen
        shell: bash
        run: |
          cat << 'EOF' > game_wrapper.py
          import os
          import sys
          import traceback

          # --- SCHRITT 1: SYSTEMPFADE REPARIEREN (Nur Linux) ---
          if sys.platform.startswith('linux') and getattr(sys, 'frozen', False):
              # PyInstaller verbiegt LD_LIBRARY_PATH. Wir holen das Original zurück,
              # damit WebKit die echten Grafiktreiber des Systems findet.
              lp = os.environ.get('LD_LIBRARY_PATH_ORIG')
              if lp:
                  os.environ['LD_LIBRARY_PATH'] = lp
              else:
                  os.environ.pop('LD_LIBRARY_PATH', None)

              # Behebt den Black Screen (Hardware-Beschleunigung unter Wayland aus)
              os.environ['WEBKIT_DISABLE_COMPOSITING_MODE'] = '1'
              os.environ['WEBKIT_DISABLE_DMABUF_RENDERER'] = '1'

          try:
              import webview

              class GameAPI:
                  def quit_game(self):
                      os._exit(0)

              if hasattr(sys, '_MEIPASS'):
                  base_path = sys._MEIPASS
              else:
                  base_path = os.path.abspath(".")

              html_file = os.path.join(base_path, 'src', 'index.html')
              if not os.path.exists(html_file):
                  html_file = os.path.join(base_path, 'index.html')

              api = GameAPI()
              webview.create_window('Asteroids', html_file, fullscreen=True, js_api=api)
              # http_server=True ist zwingend für JS-Module auf Linux!
              webview.start(http_server=True)

          except Exception:
              # Falls es doch crasht, schreibe den Fehler in eine Datei
              with open("error_log.txt", "w") as f:
                  f.write(traceback.format_exc())
              raise
          EOF

      - name: PyInstaller Build
        shell: bash
        run: |
          if [[ "${{ matrix.artifact_name }}" == "Mac_Intel" ]]; then
            arch -x86_64 python -m pip install --upgrade pip
            arch -x86_64 pip install "setuptools<69.0.0" pywebview pyinstaller bottle --force-reinstall
            arch -x86_64 pyinstaller --noconsole --name game --add-data "src:src" game_wrapper.py
          elif [[ "${{ matrix.artifact_name }}" == "Linux" ]]; then
            # NEU: --collect-all für Linux, um ALLE Grafik-Abhängigkeiten einzusammeln
            pyinstaller --noconsole --name game \
              --collect-all gi \
              --collect-all webview \
              --collect-all bottle \
              --add-data "src:src" game_wrapper.py
            chmod +x dist/game/game || true
          elif [[ "${{ matrix.artifact_name }}" == "Windows" ]]; then
            pyinstaller --noconsole --name game --add-data "src;src" game_wrapper.py
          else
            pyinstaller --noconsole --name game --add-data "src:src" game_wrapper.py
          fi

      - name: Archivieren (ZIP erstellen)
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Asteroids-${{ matrix.artifact_name }}', 'zip', 'dist/game')"

      - name: Test-Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Asteroids-${{ matrix.artifact_name }}
          path: Asteroids-${{ matrix.artifact_name }}.zip

  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Alle Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Release erstellen und Assets hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
