name: Build Web Game

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows
          - os: macos-latest
            artifact_name: Mac_Silicon
          - os: macos-latest
            artifact_name: Mac_Intel
          - os: ubuntu-latest
            artifact_name: Linux

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # DIESER SCHRITT IST NUR FÜR LINUX: Installiert die Header für pygobject
      - name: Install Build Dependencies (Linux Only)
        if: matrix.artifact_name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev build-essential libgtk-3-dev libwebkit2gtk-4.0-dev python3-dev libcairo2-dev pkg-config

      - name: Abhängigkeiten installieren
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pywebview pyinstaller
          # pygobject wird nur auf Linux installiert
          if [[ "${{ matrix.artifact_name }}" == "Linux" ]]; then
            pip install pygobject pycairo
          fi

      - name: Wrapper-Skript automatisch erstellen
        shell: bash
        run: |
          cat << 'EOF' > game_wrapper.py
          import webview
          import os
          import sys
          class GameAPI:
              def quit_game(self):
                  os._exit(0)
          if hasattr(sys, '_MEIPASS'):
              base_path = sys._MEIPASS
          else:
              base_path = os.path.abspath(".")
          html_file = os.path.join(base_path, 'src', 'index.html')
          api = GameAPI()
          webview.create_window('Asteroids', html_file, fullscreen=True, js_api=api)
          webview.start()
          EOF

      - name: PyInstaller Build
        shell: bash
        run: |
          # Struktur orientiert an deiner SpaceInvaders-Datei
          if [[ "${{ matrix.artifact_name }}" == "Mac_Intel" ]]; then
            arch -x86_64 python -m pip install --upgrade pip
            arch -x86_64 pip install pywebview pyinstaller --force-reinstall
            arch -x86_64 pyinstaller --noconsole --name game --add-data "src:src" game_wrapper.py
          elif [[ "${{ matrix.artifact_name }}" == "Linux" ]]; then
            # Spezielle Flags für Linux, damit 'gi' eingepackt wird
            pyinstaller --noconsole --name game --collect-all gi --collect-all webview --add-data "src:src" game_wrapper.py
            chmod +x dist/game/game
          elif [[ "${{ matrix.artifact_name }}" == "Windows" ]]; then
            pyinstaller --noconsole --name game --add-data "src;src" game_wrapper.py
          else
            # Mac Silicon
            pyinstaller --noconsole --name game --add-data "src:src" game_wrapper.py
          fi

      - name: Archivieren
        shell: bash
        run: |
          # Name angepasst an deine Struktur
          python -c "import shutil; shutil.make_archive('Asteroids-${{ matrix.artifact_name }}', 'zip', 'dist/game')"

      - name: Test-Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Asteroids-${{ matrix.artifact_name }}
          path: Asteroids-${{ matrix.artifact_name }}.zip

      - name: Release erstellen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Asteroids-${{ matrix.artifact_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
