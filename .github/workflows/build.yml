name: Build Web Game

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-x64
          - os: ubuntu-22.04
            artifact_name: linux-x64
          - os: macos-latest
            artifact_name: macos-arm64
          - os: macos-26-intel
            artifact_name: macos-amd64

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Build Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev build-essential libgtk-3-dev libwebkit2gtk-4.0-dev python3-dev libcairo2-dev

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install pywebview pyinstaller pygobject pycairo

      - name: Wrapper-Skript automatisch erstellen
        shell: bash
        run: |
          cat << 'EOF' > game_wrapper.py
          import webview
          import os
          import sys
          class GameAPI:
              def quit_game(self):
                  os._exit(0)
          if hasattr(sys, '_MEIPASS'):
              base_path = sys._MEIPASS
          else:
              base_path = os.path.abspath(".")
          html_file = os.path.join(base_path, 'src', 'index.html')
          api = GameAPI()
          webview.create_window('Asteroids', html_file, fullscreen=True, js_api=api)
          webview.start()
          EOF

      - name: PyInstaller Build
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            pyinstaller --noconsole --name game --add-data "src;src" game_wrapper.py
          else
            pyinstaller --noconsole --name game --collect-all gi --collect-all webview --add-data "src:src" game_wrapper.py
          fi

      - name: Archivieren
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ] || [ "${{ runner.os }}" = "macOS" ]; then
            cd dist/game && zip -r "../../Game-${{ matrix.artifact_name }}.zip" .
          else
            python -c "import shutil; shutil.make_archive('Game-${{ matrix.artifact_name }}', 'zip', 'dist/game')"
          fi

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Game-${{ matrix.artifact_name }}
          path: Game-${{ matrix.artifact_name }}.zip
          retention-days: 7

  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Alle Artifacts herunterladen
        uses: actions/upload-artifact@v4
        with:
          path: artifacts/
      - name: Release erstellen und Assets hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
