name: Build-Web-Game-Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows
          - os: macos-latest
            artifact_name: Mac_Silicon
          - os: macos-latest
            artifact_name: Mac_Intel
          - os: ubuntu-latest
            artifact_name: Linux

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: System-Pakete installieren (Nur Linux)
        if: matrix.artifact_name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgirepository1.0-dev build-essential libgtk-3-dev libwebkit2gtk-4.1-dev python3-dev libcairo2-dev

      - name: Abhängigkeiten installieren
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<69.0.0" pywebview pyinstaller bottle
          if [[ "${{ matrix.artifact_name }}" == "Linux" ]]; then
            pip install "PyGObject==3.48.2" pycairo
          fi

      - name: Wrapper-Skript automatisch erstellen
        shell: bash
        run: |
          cat << 'EOF' > game_wrapper.py
          import os
          import sys

          # --- SCHRITT 1: DER LINUX-FIX (MUSS GANZ OBEN STEHEN) ---
          if sys.platform.startswith('linux') and getattr(sys, 'frozen', False):
              # 1.1: Library-Pfad bereinigen (Verhindert den Absturz / "Failed to execute script")
              # Wir löschen den Pfad, den PyInstaller gesetzt hat, damit WebKit die System-Treiber nutzt.
              if 'LD_LIBRARY_PATH' in os.environ:
                  del os.environ['LD_LIBRARY_PATH']
              
              # 1.2: Rendering-Fix (Verhindert den Black Screen unter Ubuntu 24.04)
              os.environ['WEBKIT_DISABLE_DMABUF_RENDERER'] = '1'
              os.environ['WEBKIT_DISABLE_COMPOSITING_MODE'] = '1'
              # Unterdrückt die Canberra-Warnung
              os.environ['GTK_MODULES'] = ''

          # --- SCHRITT 2: PROGRAMM STARTEN ---
          try:
              import webview
              import bottle # Sicherstellen, dass bottle da ist

              class GameAPI:
                  def quit_game(self):
                      os._exit(0)

              if hasattr(sys, '_MEIPASS'):
                  base_path = sys._MEIPASS
              else:
                  base_path = os.path.abspath(".")

              html_file = os.path.join(base_path, 'src', 'index.html')
              if not os.path.exists(html_file):
                  html_file = os.path.join(base_path, 'index.html')

              api = GameAPI()
              # Wir schalten 'debug=True' ein, damit wir bei einem Black Screen mit Rechtsklick -> Inspect sehen, was los ist
              window = webview.create_window('Asteroids', html_file, fullscreen=True, js_api=api)
              
              # http_server=True ist nötig, weil dein Spiel JS-Module nutzt (import ... from ...)
              webview.start(http_server=True, debug=True)
              
          except Exception as e:
              # Schreibt den Fehler direkt ins Terminal
              print(f"\nFATALER FEHLER BEIM START: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)
          EOF

      - name: PyInstaller Build
        shell: bash
        run: |
          if [[ "${{ matrix.artifact_name }}" == "Mac_Intel" ]]; then
            arch -x86_64 python -m pip install --upgrade pip
            arch -x86_64 pip install "setuptools<69.0.0" pywebview pyinstaller bottle --force-reinstall
            arch -x86_64 pyinstaller --noconsole --name game --add-data "src:src" game_wrapper.py
          elif [[ "${{ matrix.artifact_name }}" == "Linux" ]]; then
            # Wir packen ALLES ein, was mit Grafik zu tun hat
            pyinstaller --noconsole --name game \
              --collect-all gi \
              --collect-all webview \
              --collect-all bottle \
              --add-data "src:src" game_wrapper.py
            chmod +x dist/game/game || true
          elif [[ "${{ matrix.artifact_name }}" == "Windows" ]]; then
            pyinstaller --noconsole --name game --add-data "src;src" game_wrapper.py
          else
            # Mac Silicon
            pyinstaller --noconsole --name game --add-data "src:src" game_wrapper.py
          fi

      - name: Archivieren (ZIP erstellen)
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Asteroids-${{ matrix.artifact_name }}', 'zip', 'dist/game')"

      - name: Test-Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Asteroids-${{ matrix.artifact_name }}
          path: Asteroids-${{ matrix.artifact_name }}.zip

  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Alle Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Release erstellen und Assets hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
