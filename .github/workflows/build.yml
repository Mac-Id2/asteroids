name: Build-Web-Game-Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows
          - os: macos-latest
            artifact_name: Mac_Silicon
          - os: macos-latest
            artifact_name: Mac_Intel
          - os: ubuntu-latest
            artifact_name: Linux

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: System-Pakete installieren (Nur Linux)
        if: matrix.artifact_name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgirepository1.0-dev build-essential libgtk-3-dev libwebkit2gtk-4.1-dev python3-dev libcairo2-dev

      - name: Abhängigkeiten installieren
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<69.0.0" pywebview pyinstaller bottle
          # Zurück zur schlanken GTK-Brücke (kein riesiges QT mehr!)
          if [[ "${{ matrix.artifact_name }}" == "Linux" ]]; then
            pip install "PyGObject==3.48.2" pycairo
          fi

      - name: Wrapper-Skript automatisch erstellen
        shell: bash
        run: |
          cat << 'EOF' > game_wrapper.py
          import os
          import sys

          # NUR die Rendering-Fixes für den Black Screen unter Linux.
          # KEINE Manipulationen mehr am LD_LIBRARY_PATH!
          if sys.platform.startswith('linux'):
              os.environ['WEBKIT_DISABLE_DMABUF_RENDERER'] = '1'
              os.environ['WEBKIT_DISABLE_COMPOSITING_MODE'] = '1'
              os.environ['GTK_MODULES'] = ''

          import webview

          class GameAPI:
              def quit_game(self):
                  os._exit(0)

          if hasattr(sys, '_MEIPASS'):
              base_path = sys._MEIPASS
          else:
              base_path = os.path.abspath(".")

          html_file = os.path.join(base_path, 'src', 'index.html')
          if not os.path.exists(html_file):
              html_file = os.path.join(base_path, 'index.html')

          api = GameAPI()
          webview.create_window('Asteroids', html_file, fullscreen=True, js_api=api)
          
          # http_server=True umgeht die Linux-CORS-Sperre für dein ES6-Module-Script!
          webview.start(http_server=True)
          EOF

      - name: PyInstaller Build
        shell: bash
        run: |
          if [[ "${{ matrix.artifact_name }}" == "Mac_Intel" ]]; then
            arch -x86_64 python -m pip install --upgrade pip
            arch -x86_64 pip install "setuptools<69.0.0" pywebview pyinstaller bottle --force-reinstall
            arch -x86_64 pyinstaller --noconsole --name game --add-data "src:src" game_wrapper.py
          elif [[ "${{ matrix.artifact_name }}" == "Linux" ]]; then
            # Richtiges Einpacken: collect-all stellt sicher, dass _gi.so nicht fehlt!
            pyinstaller --noconsole --name game \
              --collect-all gi \
              --collect-all webview \
              --hidden-import bottle \
              --add-data "src:src" game_wrapper.py
            chmod +x dist/game/game || true
          elif [[ "${{ matrix.artifact_name }}" == "Windows" ]]; then
            pyinstaller --noconsole --name game --add-data "src;src" game_wrapper.py
          else
            # Mac Silicon
            pyinstaller --noconsole --name game --add-data "src:src" game_wrapper.py
          fi

      - name: Archivieren (ZIP erstellen)
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Asteroids-${{ matrix.artifact_name }}', 'zip', 'dist/game')"

      - name: Test-Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Asteroids-${{ matrix.artifact_name }}
          path: Asteroids-${{ matrix.artifact_name }}.zip

  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Alle Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Release erstellen und Assets hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
