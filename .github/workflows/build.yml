name: Build-Web-Game-Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows
          - os: macos-latest
            artifact_name: Mac_Silicon
          - os: macos-latest
            artifact_name: Mac_Intel
          - os: ubuntu-latest
            artifact_name: Linux

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: System-Pakete installieren (Nur Linux)
        if: matrix.artifact_name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgirepository1.0-dev build-essential libgtk-3-dev libwebkit2gtk-4.1-dev python3-dev libcairo2-dev

      - name: Abhängigkeiten installieren
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<69.0.0" pywebview pyinstaller bottle
          if [[ "${{ matrix.artifact_name }}" == "Linux" ]]; then
            pip install "PyGObject==3.48.2" pycairo
          fi

      # NEU: Wir injizieren einen Lebensretter in dein HTML, der den 0x0 Bug heilt 
      # und JS-Fehler sichtbar auf den Canvas schreibt!
      - name: Inject Linux JS Fixes
        shell: bash
        run: |
          cat << 'EOF' > src/linux_fix.js
          // 1. Schreibt JS-Fehler riesig auf den Bildschirm
          window.addEventListener('error', function(e) {
              var div = document.createElement('div');
              div.style.cssText = 'position:absolute; top:20px; left:20px; color:red; background:white; padding:10px; font-size:24px; z-index:9999; border:2px solid red;';
              div.innerHTML = 'JS FEHLER: ' + e.message + '<br>Datei: ' + e.filename + '<br>Zeile: ' + e.lineno;
              document.body.appendChild(div);
          });
          // 2. Heilt den 0x0 Wayland Fullscreen-Bug
          setInterval(function() {
              var cvs = document.getElementById('gameCanvas');
              if (cvs && (cvs.width === 0 || window.innerWidth !== cvs.width)) {
                  window.dispatchEvent(new Event('resize'));
              }
          }, 500);
          EOF
          sed -i 's|<head>|<head><script src="./linux_fix.js"></script>|g' src/index.html

      - name: Wrapper-Skript automatisch erstellen
        shell: bash
        run: |
          cat << 'EOF' > game_wrapper.py
          import os
          import sys
          import mimetypes

          # WICHTIG: Sagt dem internen Server, dass JS auch wirklich JS ist (behebt MIME-Type Blocker)
          mimetypes.add_type('application/javascript', '.js')

          if sys.platform.startswith('linux'):
              os.environ['WEBKIT_DISABLE_DMABUF_RENDERER'] = '1'

          import webview

          class GameAPI:
              def quit_game(self):
                  os._exit(0)

          if hasattr(sys, '_MEIPASS'):
              base_path = sys._MEIPASS
          else:
              base_path = os.path.abspath(".")

          html_file = os.path.join(base_path, 'src', 'index.html')

          api = GameAPI()
          webview.create_window('Asteroids', html_file, fullscreen=True, js_api=api)
          
          webview.start(http_server=True)
          EOF

      - name: PyInstaller Build
        shell: bash
        run: |
          if [[ "${{ matrix.artifact_name }}" == "Mac_Intel" ]]; then
            arch -x86_64 python -m pip install --upgrade pip
            arch -x86_64 pip install "setuptools<69.0.0" pywebview pyinstaller bottle --force-reinstall
            arch -x86_64 pyinstaller --noconsole --name game --add-data "src:src" game_wrapper.py
          elif [[ "${{ matrix.artifact_name }}" == "Linux" ]]; then
            # Sauber verpackt mit ~12MB!
            pyinstaller --noconsole --name game \
              --hidden-import gi \
              --hidden-import bottle \
              --add-data "src:src" game_wrapper.py
            chmod +x dist/game/game || true
          elif [[ "${{ matrix.artifact_name }}" == "Windows" ]]; then
            pyinstaller --noconsole --name game --add-data "src;src" game_wrapper.py
          else
            pyinstaller --noconsole --name game --add-data "src:src" game_wrapper.py
          fi

      - name: Archivieren (ZIP erstellen)
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Asteroids-${{ matrix.artifact_name }}', 'zip', 'dist/game')"

      - name: Test-Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Asteroids-${{ matrix.artifact_name }}
          path: Asteroids-${{ matrix.artifact_name }}.zip

  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Alle Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Release erstellen und Assets hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
